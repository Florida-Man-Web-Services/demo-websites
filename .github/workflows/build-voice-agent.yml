name: Build voice-agent

on:
  push:
    branches:
      - main
    paths:
      - 'voice-agent/**'
      - 'gainesville-no-website/gainesville_no_website.json'
      - '.github/workflows/build-voice-agent.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Zot registry
        uses: docker/login-action@v3
        with:
          registry: zot.hwcopeland.net
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_API_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: voice-agent/Dockerfile
          push: true
          tags: zot.hwcopeland.net/florida-man-bioscience/voice-agent:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
